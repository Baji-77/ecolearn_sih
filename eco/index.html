<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overlay"></div>

  <div class="login-wrapper">
    <div class="login-form">
      <h2>Welcome</h2>

      <!-- Tabs for Student/Admin -->
      <div class="tabs">
        <button class="tab-btn active" onclick="showForm('student')">Student</button>
        <button class="tab-btn" onclick="showForm('admin')">Teacher</button>
      </div>

      <!-- Student Form -->
      <form id="student-form" onsubmit="return loginStudent(event)">
        <div class="input-group">
          <input type="text" id="studentName" placeholder="Student Name" required>
        </div>
        <div class="input-group">
          <input type="number" id="studentRoll" placeholder="Roll Number" required>
        </div>
        <button type="submit">Login as Student</button>
        <p id="studentMsg"></p>
      </form>

      <!-- Admin Form -->
      <form id="admin-form" class="hidden" onsubmit="return loginAdmin(event)">
        <div class="input-group">
          <input type="text" id="adminName" placeholder="Teacher Name" required>
        </div>
        <div class="input-group">
          <input type="password" id="adminPass" placeholder="Password" required>
        </div>
        <button type="submit">Login as Teacher</button>
        <div class="links">
          <a href="#">Forgot Password?</a> | 
          <a href="#">Register</a>
        </div>
        <p id="adminMsg"></p>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
