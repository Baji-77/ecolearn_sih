<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Sort - Waste Sorting Game</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      text-align: center;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      margin-bottom: 25px;
      width: 100%;
    }

    h1 {
      color: #00796b;
      font-size: 2.8rem;
      margin-bottom: 15px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .instructions {
      color: #004d40;
      font-size: 1.2rem;
      max-width: 700px;
      margin: 0 auto 25px;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.8);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 121, 107, 0.2);
    }

    .score-board {
      background-color: white;
      padding: 15px 30px;
      border-radius: 50px;
      box-shadow: 0 6px 12px rgba(0, 121, 107, 0.25);
      display: inline-block;
      margin-bottom: 20px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #00796b;
      border: 3px solid #4db6ac;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .btn {
      background: linear-gradient(to bottom, #00796b, #00564d);
      color: white;
      border: none;
      padding: 15px 35px;
      border-radius: 50px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 12px rgba(0, 121, 107, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0, 121, 107, 0.4);
    }

    .btn:active {
      transform: translateY(-2px);
    }

    .btn-start {
      background: linear-gradient(to bottom, #4caf50, #2e7d32);
    }

    .btn-reset {
      background: linear-gradient(to bottom, #f44336, #c62828);
    }

    .game-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 50px;
      margin-top: 20px;
      flex-wrap: wrap;
      width: 100%;
    }

    .grid-section {
      background: linear-gradient(to bottom, #ffffff, #f1f8e9);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0, 121, 107, 0.2);
      flex: 1;
      min-width: 400px;
      max-width: 500px;
    }

    .section-title {
      color: #00796b;
      margin-bottom: 20px;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      justify-items: center;
    }

    .item {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 3px solid #00796b;
      border-radius: 12px;
      cursor: grab;
      transition: all 0.3s;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .item:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }

    .bins-section {
      background: linear-gradient(to bottom, #ffffff, #f1f8e9);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0, 121, 107, 0.2);
      flex: 1;
      min-width: 300px;
      max-width: 400px;
    }

    .bins {
      display: flex;
      flex-direction: column;
      gap: 30px;
      align-items: center;
    }

    .bin {
      width: 100px;
      height: 100px;
      border: 3px dashed #00796b;
      border-radius: 12px;
      color: #004d40;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      padding: 10px;
      position: relative;
      overflow: hidden;
    }

    .bin:hover {
      transform: translateY(-5px);
    }

    .bin::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0.3;
      z-index: 0;
    }

    .bin-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      z-index: 1;
    }

    .bin-label {
      font-size: 0.9rem;
      z-index: 1;
      text-align: center;
    }

    .bin.plastic {
      background-color: #bbdefb;
    }
    
    .bin.plastic::before {
      background: url('data:image/svg+xml;utf8,<svg xmlns="img/plastic.webp" viewBox="0 0 100 100"><text y=".9em" font-size="90">🥤</text></svg>') center/60px repeat;
    }

    .bin.paper {
      background-color: #fff9c4;
    }
    
    .bin.paper::before {
      background: url('data:image/svg+xml;utf8,<svg xmlns="img/plastic.webp" viewBox="0 0 100 100"><text y=".9em" font-size="90">📄</text></svg>') center/60px repeat;
    }

    .bin.organic {
      background-color: #c8e6c9;
    }
    
    .bin.organic::before {
      background: url('data:image/svg+xml;utf8,<svg xmlns="img/plastic.webp" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍎</text></svg>') center/60px repeat;
    }

    .hidden {
      display: none;
    }

    /* Popup styling */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: white;
      border: 4px solid #00796b;
      border-radius: 20px;
      padding: 25px 50px;
      font-size: 1.5rem;
      color: #00796b;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      display: none;
      font-weight: bold;
    }

    /* Points pop animation */
    .points-pop {
      position: fixed;
      font-size: 2rem;
      font-weight: bold;
      color: #4caf50;
      animation: popUp 1s ease-out forwards;
      pointer-events: none;
      z-index: 100;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    @keyframes popUp {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(0, -100px) scale(1.5);
      }
    }

    .game-over {
      font-size: 2.5rem;
      color: #4caf50;
      font-weight: bold;
      margin-top: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      display: none;
    }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      .game-container {
        flex-direction: column;
        align-items: center;
      }
      
      .grid-section, .bins-section {
        min-width: 100%;
      }
      
      .bins {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
    }

    @media (max-width: 500px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
      
      .item, .bin {
        width: 80px;
        height: 80px;
      }
      
      h1 {
        font-size: 2.2rem;
      }
      
      .btn {
        padding: 12px 25px;
        font-size: 1.1rem;
      }
      
      .bin-icon {
        font-size: 1.5rem;
      }
      
      .bin-label {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-recycle"></i> Eco Sort - Waste Game</h1>
      <p class="instructions">Drag waste items to the correct recycling bins. Score points for each correct placement!</p>
      
      <div class="btn-container">
        <button class="btn btn-start" id="start-btn">
          <i class="fas fa-play"></i> Start Game
        </button>
        <button class="btn btn-reset" id="reset-btn">
          <i class="fas fa-redo"></i> Reset Game
        </button>
      </div>
      
      <div class="score-board">Score: <span id="score">0</span></div>
    </header>

    <div class="game-container">
      <div class="grid-section">
        <h2 class="section-title"><i class="fas fa-trash"></i> Waste Items</h2>
        <div class="grid" id="grid-container">
          <!-- Items will be generated here -->
        </div>
      </div>

      <div class="bins-section">
        <h2 class="section-title"><i class="fas fa-trash-restore"></i> Recycling Bins</h2>
        <div class="bins">
          <div class="bin plastic" data-bin="plastic">
            <div class="bin-icon">🥤</div>
            <div class="bin-label">Plastic</div>
          </div>
          <div class="bin organic" data-bin="organic">
            <div class="bin-icon">🍎</div>
            <div class="bin-label">Organic</div>
          </div>
          <div class="bin paper" data-bin="paper">
            <div class="bin-icon">📄</div>
            <div class="bin-label">Paper</div>
          </div>
        </div>
      </div>
    </div>

    <div id="game-over" class="game-over"></div>

    <!-- Popup message -->
    <div id="popup" class="popup"></div>
  </div>

  <script>
    const wasteItems = [
      { type: "plastic", src: "img/plastic1.jpeg" },
      { type: "plastic", src: "img/plastic2.jpeg" },
      { type: "plastic", src: "img/plastic3.jpg" },
      { type: "paper", src: "img/paper1.jpeg" },
      { type: "paper", src: "img/paper2.jpeg" },
      { type: "paper", src: "img/paper3.jpeg" },
      { type: "organic", src: "img/oraganic1.jpeg" },
      { type: "organic", src: "img/oraganic2.jpeg"},
      { type: "organic", src: "img/oraganic3.jpeg" },
      { type: "organic", src: "img/oraganic4.jpeg" },
      { type: "plastic", src: "img/plastic4.webp" },
      { type: "paper", src: "img/paper4.jpeg" },
      { type: "plastic", src: "img/plastic5.jpeg" },
      { type: "organic", src: "img/oraganic5.jpeg" },
      { type: "paper", src: "img/paper5.jpeg" },
      { type: "plastic", src: "img/plastic6.jpeg" },
    ];

    const grid = document.getElementById("grid-container");
    const scoreDisplay = document.getElementById("score");
    const popup = document.getElementById("popup");
    const startBtn = document.getElementById("start-btn");
    const resetBtn = document.getElementById("reset-btn");
    const gameOverMsg = document.getElementById("game-over");
    
    let score = 0;
    let remainingItems = 16;
    let gameStarted = false;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function showPopup(message, color = "#00796b") {
      popup.textContent = message;
      popup.style.color = color;
      popup.style.borderColor = color;
      popup.style.display = "block";

      setTimeout(() => {
        popup.style.display = "none";
      }, 1000);
    }

    function showPointsPopup(points, x, y) {
      const pointsElement = document.createElement('div');
      pointsElement.classList.add('points-pop');
      pointsElement.textContent = `+${points}`;
      pointsElement.style.left = `${x}px`;
      pointsElement.style.top = `${y}px`;
      document.body.appendChild(pointsElement);
      
      setTimeout(() => {
        document.body.removeChild(pointsElement);
      }, 1000);
    }

    function renderGrid() {
      grid.innerHTML = '';
      const shuffled = shuffle([...wasteItems]).slice(0, 16);
      
      // Create items in order
      for (let i = 0; i < 16; i++) {
        const item = shuffled[i];
        const img = document.createElement("img");
        img.src = item.src;
        img.alt = item.type;
        img.classList.add("item");
        img.setAttribute("draggable", "true");
        img.dataset.type = item.type;
        img.dataset.id = i;

        img.addEventListener("dragstart", (e) => {
          if (!gameStarted) return;
          e.dataTransfer.setData("type", item.type);
          e.dataTransfer.setData("id", i.toString());
        });

        grid.appendChild(img);
      }
      remainingItems = 16;
    }

    function setupBins() {
      const bins = document.querySelectorAll(".bin");
      bins.forEach(bin => {
        bin.addEventListener("dragover", (e) => {
          if (!gameStarted) return;
          e.preventDefault();
          bin.style.transform = "scale(1.05)";
        });

        bin.addEventListener("dragleave", () => {
          bin.style.transform = "";
        });

        bin.addEventListener("drop", (e) => {
          if (!gameStarted) return;
          e.preventDefault();
          const type = e.dataTransfer.getData("type");
          const id = e.dataTransfer.getData("id");
          const binType = bin.dataset.bin;

          const draggedImage = document.querySelector(`.item[data-id="${id}"]`);

          if (type === binType) {
            score += 100;
            scoreDisplay.textContent = score;
            if (draggedImage) {
              draggedImage.classList.add("hidden");
              remainingItems--;
            }
            showPopup("✅ Correct!");
            showPointsPopup(100, e.clientX, e.clientY);
          } else {
            score = Math.max(0, score - 50);
            scoreDisplay.textContent = score;
            showPopup("❌ Wrong bin! -50 points", "#d32f2f");
          }

          bin.style.transform = "";

          if (remainingItems === 0) {
            gameOverMsg.textContent = `🎉 Game Over! Final Score: ${score}`;
            gameOverMsg.style.display = "block";
            gameStarted = false;
            startBtn.innerHTML = '<i class="fas fa-play"></i> Play Again';
            startBtn.style.opacity = "1";
            startBtn.style.cursor = "pointer";
          }
        });
      });
    }

    startBtn.addEventListener("click", () => {
      if (!gameStarted) {
        gameStarted = true;
        score = 0;
        scoreDisplay.textContent = score;
        renderGrid();
        gameOverMsg.style.display = "none";
        showPopup("Game started! Drag items to the correct bins.", "#00796b");
        startBtn.innerHTML = '<i class="fas fa-play"></i> Game Running';
        startBtn.style.opacity = "0.7";
        startBtn.style.cursor = "default";
      }
    });

    resetBtn.addEventListener("click", () => {
      gameStarted = true;
      score = 0;
      scoreDisplay.textContent = score;
      renderGrid();
      gameOverMsg.style.display = "none";
      showPopup("Game reset! Starting over...", "#00796b");
      startBtn.innerHTML = '<i class="fas fa-play"></i> Game Running';
      startBtn.style.opacity = "0.7";
      startBtn.style.cursor = "default";
    });

    // Initialize the game without starting
    renderGrid();
    setupBins();
    startBtn.style.opacity = "1";
    startBtn.style.cursor = "pointer";
  </script>
</body>
</html>
